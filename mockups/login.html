<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinalPing — Login Mockup</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #040810; --surface: #0c1422; --card: #0f1928; --card-lit: #131f30;
      --border: rgba(255,255,255,0.06); --border-lit: rgba(14,165,233,0.25);
      --sky: #0ea5e9; --sky-dim: rgba(14,165,233,0.12);
      --indigo: #6366f1; --indigo-dim: rgba(99,102,241,0.12);
      --cyan: #22d3ee; --emerald: #10b981; --amber: #f59e0b;
      --text: #f0f6ff; --muted: #64748b; --sub: #94a3b8;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', system-ui, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
    .mockup-nav { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; gap: 4px; background: rgba(12,20,34,0.92); backdrop-filter: blur(20px); border: 1px solid rgba(14,165,233,0.2); border-radius: 100px; padding: 5px 8px; box-shadow: 0 8px 40px rgba(0,0,0,0.7); }
    .mockup-nav a { padding: 6px 14px; border-radius: 100px; font-size: 11.5px; font-weight: 600; color: var(--muted); transition: all 0.2s; text-decoration: none; white-space: nowrap; }
    .mockup-nav a:hover { color: var(--text); background: var(--sky-dim); }
    .mockup-nav a.active { color: var(--sky); background: var(--sky-dim); }
    /* ANIMATED BACKGROUND */
    .bg-canvas { position: fixed; inset: 0; z-index: 0; }
    /* Concentric radar rings fading from center */
    .bg-ring { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border-radius: 50%; border: 1px solid rgba(14,165,233,0.06); }
    /* Stars / particles */
    .stars { position: absolute; inset: 0; overflow: hidden; }
    .star { position: absolute; width: 2px; height: 2px; border-radius: 50%; background: rgba(148,163,184,0.4); animation: twinkle linear infinite; }
    @keyframes twinkle { 0%,100%{opacity:0.2} 50%{opacity:0.8} }
    /* Glow */
    .center-glow { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 600px; height: 600px; border-radius: 50%; background: radial-gradient(circle, rgba(14,165,233,0.06) 0%, transparent 70%); }
    .bottom-glow { position: absolute; bottom: -200px; left: 50%; transform: translateX(-50%); width: 800px; height: 400px; border-radius: 50%; background: radial-gradient(circle, rgba(99,102,241,0.06) 0%, transparent 60%); }
    /* Grid */
    .bg-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px); background-size: 50px 50px; mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, rgba(0,0,0,0.3), transparent); }
    /* Sweep indicator on background */
    .sweep-outer { position: absolute; top: 50%; left: 50%; width: 800px; height: 800px; transform: translate(-50%, -50%); opacity: 0.3; }
    /* LOGIN CARD */
    .login-wrap { position: relative; z-index: 10; width: 100%; max-width: 420px; padding: 24px; }
    .login-card { background: rgba(12,20,34,0.8); backdrop-filter: blur(32px); border: 1px solid rgba(14,165,233,0.15); border-radius: 24px; padding: 40px 36px; box-shadow: 0 30px 100px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.05); }
    .login-card::before { content: ''; display: block; height: 1px; background: linear-gradient(90deg, transparent, rgba(14,165,233,0.5), transparent); margin: -40px -36px 36px; }
    /* LOGO */
    .logo-wrap { display: flex; flex-direction: column; align-items: center; margin-bottom: 32px; }
    .logo-icon { width: 56px; height: 56px; border-radius: 16px; background: linear-gradient(145deg, rgba(14,165,233,0.15), rgba(99,102,241,0.1)); border: 1px solid rgba(14,165,233,0.25); display: flex; align-items: center; justify-content: center; margin-bottom: 14px; box-shadow: 0 4px 20px rgba(14,165,233,0.15); }
    .logo-label { font-size: 10px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
    .logo-name { font-size: 22px; font-weight: 800; background: linear-gradient(135deg, var(--sky), var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    /* TABS */
    .auth-tabs { display: flex; gap: 0; background: rgba(255,255,255,0.04); border-radius: 12px; padding: 4px; margin-bottom: 28px; }
    .auth-tab { flex: 1; padding: 9px; border-radius: 9px; font-size: 13px; font-weight: 700; text-align: center; cursor: pointer; transition: all 0.2s; color: var(--muted); }
    .auth-tab.active { background: rgba(14,165,233,0.15); color: var(--sky); border: 1px solid rgba(14,165,233,0.25); }
    /* FORM */
    .form-title { font-size: 20px; font-weight: 800; margin-bottom: 6px; }
    .form-sub { font-size: 13px; color: var(--sub); margin-bottom: 24px; line-height: 1.6; }
    .input-group { margin-bottom: 16px; }
    .input-label { font-size: 12px; font-weight: 700; color: var(--sub); margin-bottom: 7px; display: block; }
    .input-field { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 11px; padding: 12px 15px; font-size: 14px; color: var(--text); font-family: inherit; outline: none; transition: border-color 0.2s, background 0.2s; }
    .input-field:focus { border-color: rgba(14,165,233,0.35); background: rgba(14,165,233,0.04); }
    .input-field::placeholder { color: var(--muted); }
    .btn-main { width: 100%; padding: 13px; border-radius: 12px; font-size: 14.5px; font-weight: 700; cursor: pointer; border: none; font-family: inherit; background: linear-gradient(135deg, var(--sky), #0284c7); color: #fff; box-shadow: 0 4px 20px rgba(14,165,233,0.3); transition: all 0.2s; margin-top: 4px; }
    .btn-main:hover { box-shadow: 0 6px 28px rgba(14,165,233,0.45); transform: translateY(-1px); }
    .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
    .divider-line { flex: 1; height: 1px; background: var(--border); }
    .divider-text { font-size: 11.5px; color: var(--muted); font-weight: 500; }
    .btn-alt { width: 100%; padding: 12px; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--sub); font-family: inherit; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-alt:hover { border-color: rgba(14,165,233,0.25); color: var(--text); background: rgba(14,165,233,0.04); }
    .footer-links { display: flex; justify-content: center; gap: 20px; margin-top: 24px; }
    .footer-link { font-size: 12px; color: var(--muted); cursor: pointer; transition: color 0.2s; }
    .footer-link:hover { color: var(--sky); }
    /* KEY TAB CONTENT */
    .key-note { background: rgba(245,158,11,0.06); border: 1px solid rgba(245,158,11,0.2); border-radius: 11px; padding: 12px 14px; font-size: 12.5px; color: rgba(245,158,11,0.8); line-height: 1.6; margin-bottom: 16px; display: flex; gap: 10px; }
    .key-note-icon { flex-shrink: 0; }
    @media (prefers-reduced-motion: reduce) { .star { animation: none; } }
  </style>
</head>
<body>

<!-- BACKGROUND -->
<div class="bg-canvas">

  <div class="center-glow"></div>

  <div class="bg-ring" style="width:400px;height:400px;border-color:rgba(14,165,233,0.09);"></div>
  <div class="bg-ring" style="width:600px;height:600px;border-color:rgba(14,165,233,0.06);"></div>

    <div class="star" style="top:85%;left:62%;animation-duration:3.3s;animation-delay:2.2s;"></div>
    <div class="star" style="top:64%;left:92%;animation-duration:4.1s;animation-delay:0.3s;"></div>
    <div class="star" style="top:42%;left:5%;animation-duration:3.6s;animation-delay:1.5s;width:3px;height:3px;"></div>
    <div class="star" style="top:19%;left:56%;animation-duration:2.8s;animation-delay:0.9s;"></div>
    <div class="star" style="top:88%;left:28%;animation-duration:4.4s;animation-delay:1.3s;"></div>

    <!-- Blip dots -->
    <div style="position:absolute;top:38%;left:22%;width:5px;height:5px;border-radius:50%;background:#0ea5e9;opacity:0.5;animation:twinkle 2.4s ease-in-out infinite;"></div>
    <div style="position:absolute;top:61%;left:71%;width:4px;height:4px;border-radius:50%;background:#22d3ee;opacity:0.4;animation:twinkle 3.1s ease-in-out infinite 0.6s;"></div>
    <div style="position:absolute;top:25%;left:80%;width:4px;height:4px;border-radius:50%;background:#0ea5e9;opacity:0.35;animation:twinkle 2.7s ease-in-out infinite 1.2s;"></div>
  </div>
  <!-- Rotating sweep (large, faint) -->
  <svg class="sweep-outer" viewBox="-400 -400 800 800" fill="none">
    <line x1="0" y1="0" x2="0" y2="-400" stroke="rgba(14,165,233,0.08)" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" values="0;360" dur="10s" repeatCount="indefinite"/>
    </line>
    <path d="M0 0 L0 -400 A400 400 0 0 1 -70 -394" fill="rgba(14,165,233,0.02)">
      <animateTransform attributeName="transform" type="rotate" values="0;360" dur="10s" repeatCount="indefinite"/>
    </path>
  </svg>
</div>

<!-- LOGIN CARD -->
<div class="login-wrap">

      <div class="divider">

        <span class="divider-text">or continue with</span>

        Continue with Google
      </button>
    </div>

    <div class="footer-links">
      <span class="footer-link">Privacy Policy</span>
      <span class="footer-link">Terms of Service</span>
      <span class="footer-link">Support</span>
    </div>
  </div>

  <!-- ALTERNATIVE: Activate Key layout hint (shown below card as a ghost) -->
  <div style="text-align:center;margin-top:18px;">
    <span style="font-size:12.5px;color:var(--muted);">Don't have an account? </span>
    <span style="font-size:12.5px;color:var(--sky);cursor:pointer;font-weight:600;">Get a license key →</span>
  </div>
</div>
