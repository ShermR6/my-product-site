<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 52" width="160" height="52">
  <rect width="160" height="52" fill="#0d1117" rx="6"/>

  <defs>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- AIRCRAFT ALERTS -->
  <text
    x="10" y="20"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif"
    font-size="8"
    font-weight="700"
    letter-spacing="1.44"
    fill="#bdbdbd"
  >AIRCRAFT ALERTS</text>

  <!-- FinalPing -->
  <text
    x="10" y="38"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif"
    font-size="19"
    font-weight="800"
    letter-spacing="-0.4"
    fill="#ffffff"
  >FinalPing</text>

  <!-- Accent line -->
  <rect x="10" y="42" width="100" height="2" fill="url(#lineGrad)" rx="1"/>
